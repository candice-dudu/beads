
<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="apple-touch-icon" href="./icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="拼豆豆量">
    <meta name="theme-color" content="#f5ebe0">
    <meta name="color-scheme" content="light">
    <title>拼豆豆量記錄</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #faf7f2;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding-bottom: 90px;
            color: #5d4037;
        }
        .milk-tea-shadow {
            box-shadow: 0 4px 20px rgba(188, 163, 142, 0.15);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        header {
            padding-top: calc(env(safe-area-inset-top) + 1rem);
        }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col">
        <header class="bg-[#f5ebe0] sticky top-0 z-50 pt-12 pb-4 text-center border-b border-[#e3d5ca]">
            <h1 class="text-xl font-bold text-[#6d4c41] tracking-widest">拼豆豆量記錄</h1>
        </header>

        <div class="px-5 py-6">
            <div class="relative">
                <h2 class="text-6xl font-black text-[#d7c0ae]/20 absolute -top-4 -left-2 pointer-events-none">{{ activeTab }}</h2>
                <p class="relative z-1 text-[#8d7b68] font-semibold text-lg ml-2">分類索引：{{ activeTab }} 頁</p>
            </div>
        </div>

        <main class="flex-grow px-5 space-y-4">
            <div v-if="filteredInventory.length === 0" class="text-center py-24 text-[#bca38e]/60">
                <p class="text-sm tracking-wide">暫時沒有記錄<br>請按下方 "+" 鍵新增拼豆</p>
            </div>
            
            <div v-for="item in filteredInventory" :key="item.id" 
                 @click="openEditModal(item)"
                 class="bg-white p-2 rounded-2xl milk-tea-shadow border border-[#f5ebe0] flex items-center space-x-4 active:scale-95 transition-all cursor-pointer">
                <div class="w-10 h-10 rounded-2xl shadow-inner shrink-0 border border-gray-100" 
                     :style="{ backgroundColor: getColorHex(item.colorCode) }"></div>
                
                <div class="flex-grow">
                    <div class="flex justify-between items-center">
                        <h3 class="font-bold text-[#5d4037]">{{ item.colorCode }}</h3>
                        <span class="text-[10px] px-2 py-0.5 bg-[#f5ebe0] text-[#8d7b68] rounded-md font-medium">{{ item.packageType }}</span>
                    </div>
                    <div class="flex justify-between items-end mt-1">
                        <p class="text-xs text-[#bca38e]">總重: {{ item.totalWeight }}g</p>
                        <div class="text-right">
                            <p v-if="item.estimatedCount <= (item.minThreshold || 100)" 
                               class="text-[9px] text-orange-400 font-bold tracking-tighter uppercase mb-0.5 animate-pulse">
                               Low Stock
                            </p>
                            <p class="text-[#a68a64] font-bold">
                                <span class="text-lg">{{ item.estimatedCount }}</span> <span class="text-[10px]">粒</span>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <button @click="openAddModal" 
                class="fixed right-6 bottom-28 w-14 h-14 bg-[#bca38e] text-white rounded-full shadow-lg flex items-center justify-center text-3xl font-light hover:bg-[#a68a64] transition-colors z-20">
            <span class="mb-1">+</span>
        </button>

        <nav class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-[#f5ebe0] flex overflow-x-auto no-scrollbar px-3 py-4 z-30">
            <button v-for="tab in tabs" :key="tab"
                    @click="activeTab = tab"
                    :class="['flex-shrink-0 w-11 h-11 mx-1 rounded-full flex items-center justify-center font-bold transition-all', 
                             activeTab === tab ? 'bg-[#bca38e] text-white shadow-md scale-110' : 'bg-[#f5f5f5] text-[#d7c0ae]']">
                {{ tab }}
            </button>
        </nav>

        <div v-if="isModalOpen" class="fixed inset-0 bg-[#5d4037]/30 backdrop-blur-[2px] flex items-center justify-center z-50 p-6">
            <div class="bg-[#faf7f2] w-full max-w-sm rounded-[2rem] p-7 shadow-2xl border border-white">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-lg font-bold text-[#6d4c41]">{{ isEditing ? '編輯紀錄' : '新增拼豆' }}</h3>
                    <button @click="closeModal" class="text-[#bca38e]">✕</button>
                </div>
                
                <div class="space-y-4">
                    <div class="bg-white p-3 rounded-2xl border border-[#f5ebe0]">
                        <label class="block text-[10px] uppercase tracking-widest text-[#bca38e] mb-1 ml-1">色號編碼</label>
                        <select v-model="formData.colorCode" class="w-full bg-transparent border-0 p-1 focus:ring-0 text-[#5d4037] font-bold outline-none">
                            <option value="" disabled>請選擇色號</option>
                            <option v-for="code in availableColorCodes" :key="code" :value="code">{{ code }}</option>
                        </select>
                    </div>

                    <div v-if="formData.colorCode" class="flex items-center space-x-4 px-2">
                        <div class="w-10 h-10 rounded-full border-2 border-white shadow-sm" :style="{ backgroundColor: getColorHex(formData.colorCode) }"></div>
                        <span class="text-xs text-[#8d7b68]">色號 {{ formData.colorCode }} 對應色塊</span>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-white p-3 rounded-2xl border border-[#f5ebe0]">
                            <label class="block text-[10px] text-[#bca38e] mb-1">包裝</label>
                            <select v-model="formData.packageType" class="w-full bg-transparent border-0 outline-none text-sm text-[#5d4037]">
                                <option value="大瓶">大瓶 (7.7g)</option>
                                <option value="小瓶">小瓶 (6.25g)</option>
                                <option value="袋裝">袋裝 (1g)</option>
                            </select>
                        </div>
                        <div class="bg-white p-3 rounded-2xl border border-[#f5ebe0]">
                            <label class="block text-[10px] text-[#bca38e] mb-1">重量 (g)</label>
                            <input type="number" v-model.number="formData.totalWeight" step="0.1" 
                                   inputmode="decimal" onclick="this.select()"
                                   class="w-full bg-transparent border-0 outline-none text-sm text-[#5d4037]" 
                                   placeholder="0.0">
                        </div>
                    </div>

                    <div class="bg-white p-3 rounded-2xl border border-[#f5ebe0]">
                        <label class="block text-[10px] text-[#bca38e] mb-1">補貨提醒水位 (粒)</label>
                        <input type="number" v-model.number="formData.minThreshold" 
                               inputmode="numeric" onclick="this.select()"
                               class="w-full bg-transparent border-0 outline-none text-sm text-[#5d4037]" 
                               placeholder="100">
                    </div>

                    <div class="bg-[#f5ebe0] py-4 rounded-3xl text-center border border-white/50">
                        <span class="block text-[10px] text-[#8d7b68] uppercase tracking-tighter mb-1">估算庫存量 (粒)</span>
                        <span class="text-4xl font-black text-[#a68a64]">{{ calculatedBeads }}</span>
                    </div>
                </div>

                <div class="flex space-x-3 mt-6">
                    <button v-if="isEditing" @click="deleteRecord" 
                            class="w-12 h-12 flex items-center justify-center bg-red-50 text-red-300 rounded-2xl hover:bg-red-100 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                    <button @click="saveRecord" 
                            class="flex-grow py-4 bg-[#bca38e] text-white font-bold rounded-2xl shadow-lg shadow-[#bca38e]/20 active:scale-95 transition-all">
                        {{ isEditing ? '更新數據' : '確認儲存' }}
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, watch, onMounted } = Vue;
        
        // 舊鑰匙和新鑰匙
        const OLD_STORAGE_KEY = 'perler_beads_milktea';
        const NEW_STORAGE_KEY = 'perler_beads_milktea_v2';

        const COLOR_DATA = {
            "A": { "A1": "#FAF4C8", "A2": "#FFFFD5", "A3": "#FEFF8B", "A4": "#FBED56", "A5": "#F4D738", "A6": "#FEAC4C", "A7": "#FE8B4C", "A8": "#FFDA45", "A9": "#FF995B", "A10": "#F77C31", "A11": "#FFDD99", "A12": "#FE9F72", "A13": "#FFC365", "A14": "#FD543D", "A15": "#FFF365", "A16": "#FFFF9F", "A17": "#FFE36E", "A18": "#FEBE7D", "A19": "#FD7C72", "A20": "#FFD568", "A21": "#FFE395", "A22": "#F4F57D", "A23": "#E6C9B7", "A24": "#F7F8A2", "A25": "#FFD67D", "A26": "#FFC830" },
            "B": { "B1": "#E6EE31", "B2": "#63F347", "B3": "#9EF780", "B4": "#5DE035", "B5": "#35E352", "B6": "#65E2A6", "B7": "#3DAF80", "B8": "#1C9C4F", "B9": "#27523A", "B10": "#95D3C2", "B11": "#5D722A", "B12": "#166F41", "B13": "#CAEB7B", "B14": "#ADE946", "B15": "#2E5132", "B16": "#C5ED9C", "B17": "#9BB13A", "B18": "#E6EE49", "B19": "#24B88C", "B20": "#C2F0CC", "B21": "#156A6B", "B22": "#0B3C43", "B23": "#303A21", "B24": "#EEFCA5", "B25": "#4E846D", "B26": "#8D7A35", "B27": "#CCE1AF", "B28": "#9EE5B9", "B29": "#C5E254", "B30": "#E2FCB1", "B31": "#B0E792", "B32": "#9CAB5A" },
            "C": { "C1": "#E8FFE7", "C2": "#A9F9FC", "C3": "#A0E2FB", "C4": "#41CCFF", "C5": "#01ACEB", "C6": "#50AAF0", "C7": "#3677D2", "C8": "#0F54C0", "C9": "#324BCA", "C10": "#3EBCE2", "C11": "#28DDDE", "C12": "#1C334D", "C13": "#CDE8FF", "C14": "#D5FDFF", "C15": "#22C4C6", "C16": "#1557A8", "C17": "#04D1F6", "C18": "#1D3344", "C19": "#1887A2", "C20": "#176DAF", "C21": "#BEDDFF", "C22": "#67B4BE", "C23": "#C8E2FF", "C24": "#7CC4FF", "C25": "#A9E5E5", "C26": "#3CAED8", "C27": "#D3DFFA", "C28": "#BBCFED", "C29": "#34488E" },
            "D": { "D1": "#AEB4F2", "D2": "#858EDD", "D3": "#2F54AF", "D4": "#182A84", "D5": "#B843C5", "D6": "#AC7BDE", "D7": "#8854B3", "D8": "#E2D3FF", "D9": "#D5B9F8", "D10": "#361851", "D11": "#B9BAE1", "D12": "#DE9AD4", "D13": "#B90095", "D14": "#8B279B", "D15": "#2F1F90", "D16": "#E3E1EE", "D17": "#C4D4F6", "D18": "#A45EC7", "D19": "#D8C3D7", "D20": "#9C32B2", "D21": "#9A009B", "D22": "#333A95", "D23": "#EBDAFC", "D24": "#7786E5", "D25": "#494FC7", "D26": "#DFC2F8" },
            "E": { "E1": "#FDD3CC", "E2": "#FEC0DF", "E3": "#FFB7E7", "E4": "#E8649E", "E5": "#F551A2", "E6": "#F13D74", "E7": "#C63478", "E8": "#FFDBE9", "E9": "#E970CC", "E10": "#D33793", "E11": "#FCDDD2", "E12": "#F78FC3", "E13": "#B5006D", "E14": "#FFD1BA", "E15": "#F8C7C9", "E16": "#FFF3EB", "E17": "#FFE2EA", "E18": "#FFC7DB", "E19": "#FEBAD5", "E20": "#D8C7D1", "E21": "#BD9DA1", "E22": "#B785A1", "E23": "#937A8D", "E24": "#E1BCE8" },
            "F": { "F1": "#FD957B", "F2": "#FC3D46", "F3": "#F74941", "F4": "#FC283C", "F5": "#E7002F", "F6": "#943630", "F7": "#971937", "F8": "#BC0028", "F9": "#E2677A", "F10": "#8A4526", "F11": "#5A2121", "F12": "#FD4E6A", "F13": "#F35744", "F14": "#FFA9AD", "F15": "#D30022", "F16": "#FEC2A6", "F17": "#E69C79", "F18": "#D37C46", "F19": "#C1444A", "F20": "#CD9391", "F21": "#F7B4C6", "F22": "#FDC0D0", "F23": "#F67E66", "F24": "#E698AA", "F25": "#E54B4F" },
            "G": { "G1": "#FFE2CE", "G2": "#FFC4AA", "G3": "#F4C3A5", "G4": "#E1B383", "G5": "#EDB045", "G6": "#E99C17", "G7": "#9D5B3E", "G8": "#753832", "G9": "#E6B483", "G10": "#D98C39", "G11": "#E0C593", "G12": "#FFC890", "G13": "#B7714A", "G14": "#8D614C", "G15": "#FCF9E0", "G16": "#F2D9BA", "G17": "#78524B", "G18": "#FFE4CC", "G19": "#E07935", "G20": "#A94023", "G21": "#B88558" },
            "H": { "H1": "#FDFBFF", "H2": "#FEFFFF", "H3": "#B6B1BA", "H4": "#89858C", "H5": "#48464E", "H6": "#2F2B2F", "H7": "#000000", "H8": "#E7D6DB", "H9": "#EDEDED", "H10": "#EEE9EA", "H11": "#CECDD5", "H12": "#FFF5ED", "H13": "#F5ECD2", "H14": "#CFD7D3", "H15": "#98A6A8", "H16": "#1D1414", "H17": "#F1EDED", "H18": "#FFFDF0", "H19": "#F6EFE2", "H20": "#949FA3", "H21": "#FFFBE1", "H22": "#CACAD4", "H23": "#9A9D94" },
            "M": { "M1": "#BCC6B8", "M2": "#8AA386", "M3": "#697D80", "M4": "#E3D2BC", "M5": "#D0CCAA", "M6": "#B0A782", "M7": "#B4A497", "M8": "#B38281", "M9": "#A58767", "M10": "#C5B2BC", "M11": "#9F7594", "M12": "#644749", "M13": "#D19066", "M14": "#C77362", "M15": "#757D78" },
            "R": { "R1": "#D50D21", "R2": "#F92F83", "R3": "#FD8324", "R4": "#F8EC31", "R5": "#35C75B", "R6": "#238891", "R7": "#19779D", "R8": "#1A60C3", "R9": "#9A56B4", "R10": "#FFDB4C", "R11": "#FFEBFB", "R12": "#D8D5CE", "R13": "#55514C", "R14": "#9FE4DF", "R15": "#77CEE9", "R16": "#3ECFCA", "R17": "#4A867A", "R18": "#7FCD9D", "R19": "#CDE55D", "R20": "#E8C7B4", "R21": "#AD6F3C", "R22": "#6C372F", "R23": "#FEB872", "R24": "#F3C1C0", "R25": "#C9675E", "R26": "#D293BE", "R27": "#EA8CB1", "R28": "#9C87D6" }
        };

        createApp({
            setup() {
                const tabs = ["A", "B", "C", "D", "E", "F", "G", "H", "M", "R"];
                const activeTab = ref("A");
                const inventory = ref([]);
                const isModalOpen = ref(false);
                const isEditing = ref(false);
                const currentEditingId = ref(null);

                const formData = ref({
                    colorCode: "",
                    packageType: "大瓶",
                    totalWeight: 0,
                    minThreshold: 100
                });

                onMounted(() => {
                    // --- 數據遷移邏輯 ---
                    const newSaved = localStorage.getItem(NEW_STORAGE_KEY);
                    const oldSaved = localStorage.getItem(OLD_STORAGE_KEY);
                    
                    if (newSaved) {
                        // 如果有新數據，優先讀取
                        inventory.value = JSON.parse(newSaved);
                    } else if (oldSaved) {
                        // 如果沒有新數據但有舊數據，搬家過來
                        console.log("偵測到舊版數據，正在遷移...");
                        inventory.value = JSON.parse(oldSaved);
                        // 存入新地方，以免下次還找不到
                        localStorage.setItem(NEW_STORAGE_KEY, oldSaved);
                    }
                });

                watch(inventory, (newVal) => {
                    localStorage.setItem(NEW_STORAGE_KEY, JSON.stringify(newVal));
                }, { deep: true });

                const availableColorCodes = computed(() => {
                    const codes = [];
                    for (let i = 1; i <= 32; i++) {
                        codes.push(`${activeTab.value}${i}`);
                    }
                    return codes;
                });

                const getColorHex = (code) => {
                    const group = code.charAt(0);
                    return (COLOR_DATA[group] && COLOR_DATA[group][code]) ? COLOR_DATA[group][code] : "#eee4db";
                };

                const calculatedBeads = computed(() => {
                    const pkgWeights = { "大瓶": 7.7, "小瓶": 6.25, "袋裝": 1 };
                    const pkgWeight = pkgWeights[formData.value.packageType] || 0;
                    const weight = formData.value.totalWeight || 0;
                    if (weight <= pkgWeight) return 0;
                    return Math.round((weight - pkgWeight) / 0.01);
                });

                const filteredInventory = computed(() => {
                    const items = inventory.value.filter(item => item.tab === activeTab.value);
                    return items.sort((a, b) => a.colorCode.localeCompare(b.colorCode, undefined, { numeric: true }));
                });

                const openAddModal = () => {
                    isEditing.value = false;
                    formData.value = { colorCode: "", packageType: "大瓶", totalWeight: "", minThreshold: 100 };
                    isModalOpen.value = true;
                };

                const openEditModal = (item) => {
                    isEditing.value = true;
                    currentEditingId.value = item.id;
                    formData.value = { ...item, minThreshold: item.minThreshold || 100 };
                    isModalOpen.value = true;
                };

                const closeModal = () => isModalOpen.value = false;

                const saveRecord = () => {
                    if (!formData.value.colorCode) return;
                    const record = {
                        ...formData.value,
                        id: isEditing.value ? currentEditingId.value : Date.now(),
                        tab: activeTab.value,
                        estimatedCount: calculatedBeads.value
                    };
                    if (isEditing.value) {
                        const index = inventory.value.findIndex(i => i.id === currentEditingId.value);
                        if (index !== -1) inventory.value[index] = record;
                    } else {
                        inventory.value.push(record);
                    }
                    closeModal();
                };

                const deleteRecord = () => {
                    inventory.value = inventory.value.filter(i => i.id !== currentEditingId.value);
                    closeModal();
                };

                return {
                    tabs, activeTab, filteredInventory,
                    isModalOpen, isEditing, formData, availableColorCodes,
                    calculatedBeads, getColorHex,
                    openAddModal, openEditModal, closeModal, saveRecord, deleteRecord
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
